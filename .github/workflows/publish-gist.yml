name: Publish Gist

on:
  push:
    branches: [main]
    paths:
      - "**/*.omp.json"
      - "winget/**/*.winget"
      - "winget/**/*.dsc.yaml"
      - "**/taskbarlayout.*.xml"
      - "**/windowsterminal.*.json"
  workflow_dispatch:

# Required repository configuration:
#   Secrets:
#     GIST_TOKEN - A GitHub PAT with the "gist" scope
#   Variables:
#     GIST_ID - The ID of the target gist to update

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validation tools
        run: pip install check-jsonschema

      - name: Validate JSON files
        run: |
          status=0
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            if ! jq empty "$f"; then
              echo "::error file=$f::Invalid JSON syntax"
              status=1
            else
              schema=$(jq -r '.["$schema"] // empty' "$f")
              if [ -n "$schema" ]; then
                echo "Validating against schema: $schema"
                if ! check-jsonschema --schemafile "$schema" "$f"; then
                  echo "::error file=$f::Schema validation failed"
                  status=1
                fi
              fi
            fi
            echo "::endgroup::"
          done < <(find . -type f \( -name '*.omp.json' -o -name 'windowsterminal.*.json' \) -print0)
          exit $status

      - name: Validate DSC YAML files
        run: |
          status=0
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            python3 -c "
          import yaml, sys
          f = sys.argv[1]
          with open(f) as fh:
              doc = yaml.safe_load(fh)
          errors = []
          if '\$schema' not in doc:
              errors.append('Missing required \$schema property')
          if 'resources' not in doc or not isinstance(doc.get('resources'), list):
              errors.append('Missing or invalid resources array')
          else:
              names = []
              for i, r in enumerate(doc['resources']):
                  for key in ('name', 'type', 'properties'):
                      if key not in r:
                          errors.append(f'Resource [{i}]: missing required field \"{key}\"')
                  name = r.get('name', '')
                  names.append(name)
              seen = set()
              for n in names:
                  if n in seen:
                      errors.append(f'Duplicate resource name: \"{n}\"')
                  seen.add(n)
          if errors:
              for e in errors:
                  print(f'::error file={f}::{e}')
              sys.exit(1)
          print(f'{len(doc.get(\"resources\", []))} resources validated OK')
          " "$f"
            if [ $? -ne 0 ]; then
              status=1
            fi
            echo "::endgroup::"
          done < <(find ./winget -type f \( -name '*.winget' -o -name '*.dsc.yaml' \) ! -name '*.new.winget' -print0)
          exit $status

      - name: Update Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Clone the gist as a git repo
          gh gist clone "${{ vars.GIST_ID }}" /tmp/gist
          cd /tmp/gist

          # Configure auth for push
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@gist.github.com/${{ vars.GIST_ID }}.git"

          # Clear all files (preserves .git)
          find . -maxdepth 1 -type f -delete

          # Copy all matching files into the gist (flattened)
          while IFS= read -r -d '' f; do
            name=$(basename "$f")
            echo "Adding $name"
            cp "$f" "/tmp/gist/$name"
          done < <(find "$GITHUB_WORKSPACE" -type f \( -name '*.omp.json' -o -name '*.winget' -o -name '*.dsc.yaml' -o -name 'windowsterminal.*.json' -o -name 'taskbarlayout.*.xml' \) ! -name '*.new.winget' -print0)

          # Commit and push if there are changes
          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected, skipping gist update."
            exit 0
          fi

          echo "Changes detected:"
          git diff --cached --stat

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync config files from provision-machine"
          git push
          echo "Gist updated successfully."
