name: Update Dynamic WinGet Packages

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-packages:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Install-Module -Name Microsoft.WinGet.Client -Force -Scope CurrentUser

      - name: Query WinGet for current packages
        id: query
        shell: pwsh
        run: |
          Import-Module Microsoft.WinGet.Client

          # .NET SDK: two most recent non-preview versions (mirrors Provision-Machine.ps1 logic)
          $DotNetSdkIds = Find-WinGetPackage -Source 'winget' -Query 'Microsoft.DotNet.SDK' |
            Where-Object { $_.Id -notmatch '\.Preview' } |
            Select-Object -Last 2 |
            ForEach-Object { $_.Id }

          Write-Host "Resolved .NET SDK packages: $($DotNetSdkIds -join ', ')"

          # VC Redistributables: exclude x86 and arm64 variants (mirrors Provision-Machine.ps1 logic)
          $VcRedistIds = Find-WinGetPackage -Source 'winget' -Query 'Microsoft.VCRedist' |
            Where-Object { $_.Id -notmatch '\.(x86|arm64)' } |
            Sort-Object -Descending -Property Id |
            ForEach-Object { $_.Id }

          Write-Host "Resolved VC Redist packages: $($VcRedistIds -join ', ')"

          if (-not $DotNetSdkIds -and -not $VcRedistIds) {
            Write-Host "::error::No packages resolved from WinGet queries."
            exit 1
          }

          # Pass to next step via JSON
          $pkgs = @{
            dotnet = @($DotNetSdkIds)
            vcredist = @($VcRedistIds)
          } | ConvertTo-Json -Compress

          "packages=$pkgs" >> $env:GITHUB_OUTPUT

      - name: Install Python dependencies
        run: pip install ruamel.yaml

      - name: Update DSC configuration files
        id: update
        shell: python
        env:
          PACKAGES_JSON: ${{ steps.query.outputs.packages }}
        run: |
          import json
          import os
          import re
          from ruamel.yaml import YAML
          from ruamel.yaml.comments import CommentedMap

          pkgs = json.loads(os.environ["PACKAGES_JSON"])
          dotnet_ids = pkgs["dotnet"]
          vcredist_ids = pkgs["vcredist"]

          DYNAMIC_ID_RE = re.compile(r"^Microsoft\.(DotNet\.SDK\.\d|VCRedist\.)")

          yaml = YAML()
          yaml.preserve_quotes = True

          def make_entry(pkg_id, description):
              entry = CommentedMap()
              entry["name"] = description
              entry["type"] = "Microsoft.WinGet/Package"
              meta = CommentedMap()
              meta["description"] = description
              meta["module"] = "Microsoft.WinGet"
              entry["metadata"] = meta
              props = CommentedMap()
              props["id"] = pkg_id
              props["source"] = "winget"
              entry["properties"] = props
              return entry

          # Build replacement entries
          new_entries = []
          for pkg_id in dotnet_ids:
              ver = re.sub(r"^Microsoft\.DotNet\.SDK\.", "", pkg_id)
              new_entries.append(make_entry(pkg_id, f"Install DotNet SDK {ver}"))
          for pkg_id in vcredist_ids:
              label = re.sub(r"^Microsoft\.VCRedist\.", "VCRedist ", pkg_id).replace(".", " ")
              new_entries.append(make_entry(pkg_id, f"Install {label}"))

          changed = False
          for filename in ("winget/modules/packages-common.dsc.yaml",):
              with open(filename, encoding="utf-8") as f:
                  original = f.read()

              doc = yaml.load(original)
              resources = doc["resources"]

              # Find dynamic entry indices
              dynamic_indices = [
                  i for i, r in enumerate(resources)
                  if DYNAMIC_ID_RE.match(r.get("properties", {}).get("id", ""))
              ]

              if not dynamic_indices:
                  print(f"No dynamic entries found in {filename} â€” skipping")
                  continue

              # Remove old entries (reverse order to preserve indices)
              for i in reversed(dynamic_indices):
                  del resources[i]

              # Insert new entries at the position of the first removed entry
              insert_at = dynamic_indices[0]
              for j, entry in enumerate(new_entries):
                  resources.insert(insert_at + j, entry)

              # Write back (ruamel.yaml preserves comments)
              from io import StringIO
              buf = StringIO()
              yaml.dump(doc, buf)
              result = buf.getvalue()

              if result.rstrip() != original.rstrip():
                  changed = True
                  with open(filename, "w", encoding="utf-8", newline="") as f:
                      f.write(result)
                  print(f"Updated {filename}")
              else:
                  print(f"No changes needed for {filename}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add winget/modules/packages-common.dsc.yaml
          git commit -m "chore: update dynamic WinGet packages (.NET SDK & VC Redist)"
          git push
