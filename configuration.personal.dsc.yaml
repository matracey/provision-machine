        SettingValue: 15
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Lid Close AC Do Nothing
      directives:
        description: Lid Close AC Do Nothing
      settings:
        executable: powercfg
        arguments:
          - /SETACVALUEINDEX
          - SCHEME_CURRENT
          - SUB_BUTTONS
          - LIDACTION
          - "0"
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Lid Close Battery Sleep
      directives:
        description: Lid Close Battery Sleep
      settings:
        executable: powercfg
        arguments:
          - /SETDCVALUEINDEX
          - SCHEME_CURRENT
          - SUB_BUTTONS
          - LIDACTION
          - "1"
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Apply Power Plan Changes
      directives:
        description: Apply Power Plan Changes
      settings:
        executable: powercfg
        arguments:
          - /SETACTIVE
          - SCHEME_CURRENT
      dependsOn:
        - "[resourceId('Microsoft.DSC.Transitional/RunCommandOnSet', 'Lid Close AC Do Nothing')]"
        - "[resourceId('Microsoft.DSC.Transitional/RunCommandOnSet', 'Lid Close Battery Sleep')]"
    # ============================================================
    # Execution Policy
    # ============================================================
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
