        valueName: PromptOnSecureDesktop
        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: UAC Validate admin code signatures
      directives:
        description: UAC Validate admin code signatures
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        valueName: ValidateAdminCodeSignatures
        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: UAC Filter administrator token
      directives:
        description: UAC Filter administrator token
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        valueName: FilterAdministratorToken
        valueData:
          DWord: 0
    # ============================================================
    # Windows Settings — Appearance and Behavior
    # ============================================================
    - resource: Microsoft.Windows.Developer/EnableDarkMode
      id: Enable Dark Mode
      directives:
        description: Enable Dark Mode
        allowPrerelease: true
      settings:
        Ensure: Present
        RestartExplorer: true
    - resource: Microsoft.Windows.Developer/Taskbar
      id: Taskbar Settings
      directives:
        description: Taskbar Settings
        allowPrerelease: true
      settings:
        Alignment: Left
        HideLabelsMode: Always
        SearchboxMode: Hide
        TaskViewButton: Show
        WidgetsButton: Hide
        RestartExplorer: true
    - resource: Microsoft.Windows.Developer/WindowsExplorer
      id: Windows Explorer Settings
      directives:
        description: Windows Explorer Settings
        allowPrerelease: true
      settings:
        FileExtensions: Show
        ItemCheckBoxes: Hide
    - resource: Microsoft.Windows.Developer/ShowSecondsInClock
      id: Show Seconds In Clock
      directives:
        description: Show Seconds In Clock
        allowPrerelease: true
      settings:
        Ensure: Present
    # ============================================================
    # Desktop Background — Windows Spotlight (requires Win11 22H2+)
    # ============================================================
    - resource: Microsoft.Windows/Registry
      id: Desktop Background Spotlight
      directives:
        description: Desktop Background Spotlight
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Wallpapers
        valueName: BackgroundType
        valueData:
          DWord: 3
    # ============================================================
    # Power Plan Settings
    # ============================================================
    - resource: Microsoft.Windows.Developer/PowerPlanSetting
      id: Display Timeout AC 30 Minutes
      directives:
        description: Display Timeout AC 30 Minutes
        allowPrerelease: true
      settings:
        Name: DisplayTimeout
        PowerSource: PluggedIn
        SettingValue: 30
    - resource: Microsoft.Windows.Developer/PowerPlanSetting
      id: Display Timeout Battery 5 Minutes
      directives:
        description: Display Timeout Battery 5 Minutes
        allowPrerelease: true
      settings:
        Name: DisplayTimeout
        PowerSource: Battery
        SettingValue: 5
    - resource: Microsoft.Windows.Developer/PowerPlanSetting
      id: Sleep Timeout AC Never
      directives:
        description: Sleep Timeout AC Never
        allowPrerelease: true
      settings:
        Name: SleepTimeout
        PowerSource: PluggedIn
        SettingValue: 0
    - resource: Microsoft.Windows.Developer/PowerPlanSetting
      id: Sleep Timeout Battery 15 Minutes
      directives:
        description: Sleep Timeout Battery 15 Minutes
        allowPrerelease: true
      settings:
        Name: SleepTimeout
        PowerSource: Battery
        SettingValue: 15
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Lid Close AC Do Nothing
      directives:
        description: Lid Close AC Do Nothing
      settings:
        executable: powercfg
        arguments:
          - /SETACVALUEINDEX
          - SCHEME_CURRENT
          - SUB_BUTTONS
          - LIDACTION
          - "0"
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Lid Close Battery Sleep
      directives:
        description: Lid Close Battery Sleep
      settings:
        executable: powercfg
        arguments:
          - /SETDCVALUEINDEX
          - SCHEME_CURRENT
          - SUB_BUTTONS
          - LIDACTION
          - "1"
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Apply Power Plan Changes
      directives:
        description: Apply Power Plan Changes
      settings:
        executable: powercfg
        arguments:
          - /SETACTIVE
          - SCHEME_CURRENT
      dependsOn:
        - "[resourceId('Microsoft.DSC.Transitional/RunCommandOnSet', 'Lid Close AC Do Nothing')]"
        - "[resourceId('Microsoft.DSC.Transitional/RunCommandOnSet', 'Lid Close Battery Sleep')]"
    # ============================================================
    # Execution Policy
    # ============================================================
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Set ExecutionPolicy Unrestricted CurrentUser
      directives:
        description: Set ExecutionPolicy Unrestricted CurrentUser
      settings:
        executable: pwsh
        arguments:
          - -NoProfile
          - -Command
          - Set-ExecutionPolicy Unrestricted -Scope CurrentUser -Force
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Set ExecutionPolicy Unrestricted LocalMachine
      directives:
        description: Set ExecutionPolicy Unrestricted LocalMachine
      settings:
        executable: pwsh
        arguments:
          - -NoProfile
          - -Command
          - Set-ExecutionPolicy Unrestricted -Scope LocalMachine -Force
    # ============================================================
    # Windows Defender Exclusions
    # ============================================================
    - resource: Microsoft.DSC.Transitional/PowerShellScript
      id: Windows Defender Exclusions
      directives:
        description: Windows Defender Exclusions
      settings:
        input:
          processExclusions:
            - bash.exe
            - Blend.exe
            - Code - Insiders.exe
            - Code.exe
            - DDConfigCA.exe
            - devenv.exe
            - dotnet.exe
            - FeedbackCollector.exe
            - git-bash.exe
            - git.exe
            - java.exe
            - java64.exe
            - Microsoft.VisualStudio.Web.Host.exe
            - mono-sgen.exe
            - mono.exe
            - msbuild.exe
            - mspdbsrv.exe
            - MSTest.exe
            - node.exe
            - node.js
            - nuget.exe
            - PerfWatson2.exe
            - perfwatson2.exe
            - powershell.exe
            - Publicize.exe
            - pwsh.exe
            - QTAgent_35.exe
            - QTAgent_40.exe
            - QTAgent.exe
            - QTAgent32_35.exe
            - QTAgent32_40.exe
            - QTAgent32.exe
            - QTDCAgent.exe
            - QTDCAgent32.exe
            - ServiceHub.Host.Node.x86.exe
            - StorePID.exe
            - T4VSHostProcess.exe
            - TailoredDeploy.exe
            - TCM.exe
            - TextTransform.exe
            - TfsLabConfig.exe
            - UserControlTestContainer.exe
            - vb7to8.exe
            - vbcscompiler.exe
            - VcxprojReader.exe
            - VsDebugWERHelper.exe
            - VSFinalizer.exe
            - VsGa.exe
            - VSHiveStub.exe
            - vshost-clr2.exe
            - vshost.exe
            - vshost32-clr2.exe
            - vshost32.exe
            - VSInitializer.exe
            - VSIXInstaller.exe
            - VSLaunchBrowser.exe
            - vsn.exe
            - VsRegEdit.exe
            - VSWebHandler.exe
            - VSWebLauncher.exe
            - wsl.exe
            - XDesProc.exe
        testScript: |
          $input = $env:DSC_RESOURCE_INPUT | ConvertFrom-Json
          $current = Get-MpPreference
          $missingProcesses = $input.input.processExclusions |
            Where-Object { $_ -notin $current.ExclusionProcess }
          @{ _inDesiredState = ($missingProcesses.Count -eq 0) } |
            ConvertTo-Json
        setScript: |
          $input = $env:DSC_RESOURCE_INPUT | ConvertFrom-Json
          foreach ($p in $input.input.processExclusions) {
            Add-MpPreference -ExclusionProcess $p -ErrorAction SilentlyContinue
          }
    # ============================================================
    # Git Configuration
    # ============================================================
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Git system core longpaths
      directives:
        description: Git system core longpaths
      settings:
        executable: git
        arguments:
          - config
          - --system
          - core.longpaths
          - "true"
    - resource: Microsoft.DSC.Transitional/RunCommandOnSet
      id: Git global credential helper
      directives:
        description: Git global credential helper
      settings:
        executable: git
        arguments:
          - config
          - --global
          - credential.helper
          - manager
