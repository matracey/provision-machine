    # ============================================================
    # Developer Mode
    # ============================================================
    - resource: Microsoft.Windows.Developer/DeveloperMode
      id: Enable Developer Mode
      directives:
        description: Enable Developer Mode
        allowPrerelease: true
      settings:
        Ensure: Present
    # ============================================================
    # Remote Desktop
    # ============================================================
    - resource: Microsoft.Windows.Developer/EnableRemoteDesktop
      id: Enable Remote Desktop
      directives:
        description: Enable Remote Desktop
        allowPrerelease: true
      settings:
        Ensure: Present
    # ============================================================
    # Long Path Support
    # ============================================================
    - resource: Microsoft.Windows.Developer/EnableLongPathSupport
      id: Enable Long Paths
      directives:
        description: Enable Long Paths
        allowPrerelease: true
      settings:
        Ensure: Present
    # ============================================================
    # File and Printer Sharing
    # ============================================================
    - resource: Microsoft.Windows.Developer/AdvancedNetworkSharingSetting
      id: Enable File and Printer Sharing
      directives:
        description: Enable File and Printer Sharing
        allowPrerelease: true
      settings:
        Name: FileAndPrinterSharing
        Profiles:
          - Domain
          - Private
          - Public
    # ============================================================
    # UAC Configuration
    # ============================================================
    - resource: Microsoft.Windows.Developer/UserAccessControl
      id: UAC Consent prompt behavior Admin
      directives:
        description: UAC Consent prompt behavior Admin
        allowPrerelease: true
      settings:
        AdminConsentPromptBehavior: RequireConsentForNonWindowsBinaries
    - resource: Microsoft.Windows/Registry
      id: UAC Consent prompt behavior User
      directives:
        description: UAC Consent prompt behavior User
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        valueName: ConsentPromptBehaviorUser
        valueData:
          DWord: 3
    - resource: Microsoft.Windows/Registry
      id: UAC Enable installer detection
      directives:
        description: UAC Enable installer detection
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        valueName: EnableInstallerDetection
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: UAC Enable LUA
      directives:
        description: UAC Enable LUA
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        valueName: EnableLUA
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: UAC Enable virtualization
