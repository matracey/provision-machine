# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Work context WinGet configuration document
# Apply with: winget configure -f configuration.work.dsc.yaml
properties:
  configurationVersion: 0.2.0
  resources:
    # ============================================================
    # TurboRDP — RDP session optimization registry values
    # ============================================================
    - resource: Microsoft.Windows/Registry
      id: RDP Select UDP TCP transport
      directives:
        description: RDP Select UDP TCP transport
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: SelectTransport
        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: RDP Enumerate HW before SW
      directives:
        description: RDP Enumerate HW before SW
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: bEnumerateHWBeforeSW
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP AVC444 mode preferred
      directives:
        description: RDP AVC444 mode preferred
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: AVC444ModePreferred
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP AVC hardware encode preferred
      directives:
        description: RDP AVC hardware encode preferred
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: AVCHardwareEncodePreferred
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP Max compression level
      directives:
        description: RDP Max compression level
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: MaxCompressionLevel
        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: RDP Image quality
      directives:
        description: RDP Image quality
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: ImageQuality
        valueData:
          DWord: 2
    - resource: Microsoft.Windows/Registry
      id: RDP Enable virtualized graphics
      directives:
        description: RDP Enable virtualized graphics
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: fEnableVirtualizedGraphics
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP VG capture frame rate
      directives:
        description: RDP VG capture frame rate
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: VGOptimization_CaptureFrameRate
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP VG compression ratio
      directives:
        description: RDP VG compression ratio
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: VGOptimization_CompressionRatio
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP Visual experience policy
      directives:
        description: RDP Visual experience policy
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: VisualExperiencePolicy
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP Disable WDDM driver
      directives:
        description: RDP Disable WDDM driver
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services
        valueName: fEnableWddmDriver
        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: RDP USB redirection mode
      directives:
        description: RDP USB redirection mode
      settings:
        keyPath: HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services\Client
        valueName: fUsbRedirectionEnableMode
        valueData:
          DWord: 2
    - resource: Microsoft.Windows/Registry
      id: RDP DWM frame interval
      directives:
        description: RDP DWM frame interval
      settings:
        keyPath: HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations
        valueName: DWMFRAMEINTERVAL
        valueData:
          DWord: 15
    - resource: Microsoft.Windows/Registry
