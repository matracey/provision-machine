        valueData:
          DWord: 0
    - resource: Microsoft.Windows/Registry
      id: RDP Flow control disable
      directives:
        description: RDP Flow control disable
      settings:
        keyPath: HKLM\SYSTEM\CurrentControlSet\Services\TermDD
        valueName: FlowControlDisable
        valueData:
          DWord: 1
    - resource: Microsoft.Windows/Registry
      id: RDP Flow control display bandwidth
      directives:
