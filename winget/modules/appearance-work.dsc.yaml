# yaml-language-server: $schema=https://aka.ms/dsc/schemas/v3/bundled/config/document.json
# Work appearance resources.
# Preview workaround: taskbar settings use registry resources because Microsoft.Windows.Developer/Taskbar failed under DSC preview.
$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: Enable Dark Mode
    type: Microsoft.Windows.Developer/EnableDarkMode
    metadata:
      description: "Enable system-wide dark mode and restart Explorer"
      module: "Microsoft.Windows.Developer"
    properties:
      Ensure: Present
      RestartExplorer: true
  - name: Taskbar Alignment Left
    type: Microsoft.Windows/Registry
    metadata:
      description: "Align taskbar icons to the left"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      valueName: TaskbarAl
      valueData:
        DWord: 0
  - name: Taskbar Never Combine
    type: Microsoft.Windows/Registry
    metadata:
      description: "Never combine taskbar buttons"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      valueName: TaskbarGlomLevel
      valueData:
        DWord: 0
  - name: Hide Taskbar Search Box
    type: Microsoft.Windows/Registry
    metadata:
      description: "Hide the taskbar search box"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      valueName: SearchboxTaskbarMode
      valueData:
        DWord: 0
  - name: Show Task View Button
    type: Microsoft.Windows/Registry
    metadata:
      description: "Show the task view button on the taskbar"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      valueName: ShowTaskViewButton
      valueData:
        DWord: 1
  - name: Hide Widgets Button
    type: Microsoft.Windows/Registry
    metadata:
      description: "Hide the widgets button on the taskbar"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      valueName: TaskbarDa
      valueData:
        DWord: 0
  - name: Restart Explorer For Taskbar Settings
    type: Microsoft.DSC.Transitional/RunCommandOnSet
    metadata:
      description: "Restart Explorer so taskbar registry changes take effect"
      module: "Microsoft.DSC.Transitional"
    dependsOn:
      - "[resourceId('Microsoft.Windows/Registry','Taskbar Alignment Left')]"
      - "[resourceId('Microsoft.Windows/Registry','Taskbar Never Combine')]"
      - "[resourceId('Microsoft.Windows/Registry','Hide Taskbar Search Box')]"
      - "[resourceId('Microsoft.Windows/Registry','Show Task View Button')]"
      - "[resourceId('Microsoft.Windows/Registry','Hide Widgets Button')]"
    properties:
      executable: pwsh
      arguments:
        - -NoProfile
        - -NonInteractive
        - -Command
        - "$procs = Get-Process explorer -ErrorAction SilentlyContinue; foreach ($proc in $procs) { Stop-Process -Id $proc.Id -Force }"
  - name: Windows Explorer Settings
    type: Microsoft.Windows.Developer/WindowsExplorer
    metadata:
      description: "Show file extensions and hide item checkboxes in File Explorer"
      module: "Microsoft.Windows.Developer"
    properties:
      FileExtensions: Show
      ItemCheckBoxes: Hide
  - name: Show Seconds In Clock
    type: Microsoft.Windows.Developer/ShowSecondsInClock
    metadata:
      description: "Display seconds in the system tray clock"
      module: "Microsoft.Windows.Developer"
    properties:
      Ensure: Present
  - name: Desktop Background Spotlight
    type: Microsoft.Windows/Registry
    metadata:
      description: "Set desktop background to Windows Spotlight"
      module: "Microsoft.Windows"
    properties:
      keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Wallpapers
      valueName: BackgroundType
      valueData:
        DWord: 3
