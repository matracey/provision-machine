# yaml-language-server: $schema=https://aka.ms/dsc/schemas/v3/bundled/config/document.json
# Work-only WinGet package resources.
$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: Install Bruno
    type: Microsoft.DSC.Transitional/RunCommandOnSet
    metadata:
      description: "Install Bruno (workaround for DSCv3 stateAndDiff bug)"
      module: "Microsoft.DSC.Transitional"
    properties:
      executable: winget
      arguments:
        - install
        - --id
        - "Bruno.Bruno"
        - --source
        - winget
        - --silent
        - --accept-package-agreements
        - --accept-source-agreements
