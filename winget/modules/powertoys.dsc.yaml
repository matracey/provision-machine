    properties:
      settings:
        version: "2"
        properties:
          ActivationShortcut:
            alt: false
            ctrl: false
            shift: true
            code: 67
            key: ""
            win: true
          copiedcolorrepresentation: "HEX"
          middleclickaction: 1
          primaryclickaction: 0
          showcolorname:
            value: false
          DefaultActivationShortcut:
            alt: false
            ctrl: false
            shift: true
            code: 67
            key: ""
            win: true
          visiblecolorformats:
            HSI:
              Key: false
              Value: "hsi(%Hu, %Si%, %In%)"
            HEX Int:
              Key: false
              Value: "0xFF%ReX%GrX%BlX"
            HEX:
              Key: true
              Value: "%Rex%Grx%Blx"
            Decimal:
              Key: false
              Value: "%Dv"
            CIEXYZ:
              Key: false
              Value: "XYZ(%Xv, %Yv, %Zv)"
            HSB:
              Key: false
              Value: "hsb(%Hu, %Sb%, %Br%)"
            CMYK:
              Key: false
              Value: "cmyk(%Cy%, %Ma%, %Ye%, %Bk%)"
            HWB:
              Key: false
              Value: "hwb(%Hu, %Wh%, %Bn%)"
            HSV:
              Key: false
              Value: "hsv(%Hu, %Sb%, %Va%)"
            RGB:
              Key: true
              Value: "rgb(%Re, %Gr, %Bl)"
            NCol:
              Key: false
              Value: "%Hn, %Wh%, %Bn%"
            HSL:
              Key: true
              Value: "hsl(%Hu, %Sl%, %Ll%)"
            VEC4:
              Key: false
              Value: "(%Reff, %Grff, %Blff, 1f)"
            CIELAB:
              Key: false
              Value: "CIELab(%Lc, %Ca, %Cb)"
          secondaryclickaction: 2
          activationaction: 1
          colorhistorylimit: 20
          changecursor:
            value: false
        name: "ColorPicker"
