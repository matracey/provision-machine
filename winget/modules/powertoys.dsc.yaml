      source: winget
      acceptAgreements: true
  - name: Microsoft.PowerToys/AdvancedPasteSettings-0
    type: Microsoft.PowerToys/AdvancedPasteSettings
    metadata:
      description: "Configure PowerToys Advanced Paste settings"
      module: "Microsoft.PowerToys"
    dependsOn:
      - "[resourceId('Microsoft.WinGet/Package','Install PowerToys')]"
    properties:
      settings:
        version: "1"
        properties:
          custom-actions:
            value: []
          IsAIEnabled:
            value: false
          additional-actions:
            transcode:
              transcode-to-mp3:
                isShown: true
                shortcut:
                  alt: false
                  ctrl: false
                  shift: false
                  code: 0
                  key: ""
                  win: false
              transcode-to-mp4:
                isShown: true
                shortcut:
                  alt: false
                  ctrl: false
                  shift: false
                  code: 0
                  key: ""
                  win: false
              isShown: true
            paste-as-file:
              paste-as-txt-file:
                isShown: true
                shortcut:
                  alt: false
                  ctrl: false
                  shift: false
                  code: 0
                  key: ""
                  win: false
              paste-as-png-file:
                isShown: true
                shortcut:
                  alt: false
                  ctrl: false
                  shift: false
                  code: 0
                  key: ""
                  win: false
              isShown: true
              paste-as-html-file:
                isShown: true
                shortcut:
                  alt: false
                  ctrl: false
                  shift: false
                  code: 0
                  key: ""
                  win: false
            image-to-text:
              isShown: true
              shortcut:
                alt: false
                ctrl: false
                shift: false
                code: 0
                key: ""
                win: false
          paste-as-plain-hotkey:
            alt: true
            ctrl: true
            shift: false
            code: 86
            key: ""
            win: true
          EnableClipboardPreview:
            value: true
          ShowCustomPreview:
            value: true
          paste-ai-configuration:
            providers: []
            active-provider-id: ""
          paste-as-json-hotkey:
            alt: false
            ctrl: false
            shift: false
            code: 0
            key: ""
            win: false
          CloseAfterLosingFocus:
            value: false
          advanced-paste-ui-hotkey:
            alt: false
            ctrl: false
            shift: true
            code: 86
            key: ""
            win: true
          paste-as-markdown-hotkey:
            alt: false
            ctrl: false
            shift: false
            code: 0
            key: ""
            win: false
        name: "AdvancedPaste"
