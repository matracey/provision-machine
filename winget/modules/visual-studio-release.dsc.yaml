# yaml-language-server: $schema=https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/2023/08/config/document.json
# Visual Studio Enterprise (Release channel) installation and workloads.
$schema: https://raw.githubusercontent.com/PowerShell/DSC/main/schemas/2023/08/config/document.json
resources:
  - name: Install Visual Studio Enterprise
    type: Microsoft.WinGet/Package
    metadata:
      description: "Install Visual Studio Enterprise via WinGet"
      module: "Microsoft.WinGet"
    properties:
      id: "Microsoft.VisualStudio.Enterprise"
      source: winget
      acceptAgreements: true
  - name: VS Release Workloads
    type: Microsoft.VisualStudio.DSC/VSComponents
    metadata:
      description: "VS Release Workloads"
      winget:
        securityContext: "elevated"
      module: "Microsoft.VisualStudio.DSC"
    dependsOn:
      - "[resourceId('Microsoft.WinGet/Package','Install Visual Studio Enterprise')]"
    properties:
      ProductId: Microsoft.VisualStudio.Product.Enterprise
      ChannelId: VisualStudio.18.Release
      Components:
        - Microsoft.VisualStudio.Workload.Azure
        - Microsoft.VisualStudio.Workload.CoreEditor
        - Microsoft.VisualStudio.Workload.Data
        - Microsoft.VisualStudio.Workload.ManagedDesktop
        - Microsoft.VisualStudio.Workload.NativeDesktop
        - Microsoft.VisualStudio.Workload.NetCrossPlat
        - Microsoft.VisualStudio.Workload.NetWeb
        - Microsoft.VisualStudio.Workload.Node
      IncludeRecommended: true
