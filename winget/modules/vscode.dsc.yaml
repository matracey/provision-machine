# yaml-language-server: $schema=https://aka.ms/dsc/schemas/v3/bundled/config/document.json
# VS Code installation resources.
# Workaround: Microsoft.WinGet/Package does not support override.
$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: Install Visual Studio Code
    type: Microsoft.DSC.Transitional/PowerShellScript
    metadata:
      description: "Install Visual Studio Code with context menu, file associations, and PATH"
      module: "Microsoft.DSC.Transitional"
    properties:
      input:
        id: "Microsoft.VisualStudioCode"
        source: winget
        override: '/VERYSILENT /MERGETASKS="!runcode,addcontextmenufiles,addcontextmenufolders,associatewithfiles,addtopath"'
      testScript: |
        param($inputData)
        & {
          try {
            & winget list --id $inputData.id --exact --source $inputData.source 2>&1 | Out-Null
            return ($LASTEXITCODE -eq 0)
          } catch { return $false }
        } 2>$null
      setScript: |
        param($inputData)
        & {
          try {
            & winget install --id $inputData.id --source $inputData.source --silent --accept-package-agreements --accept-source-agreements --override $inputData.override 2>&1 | Out-Null
          } catch { }
        } 2>$null
  - name: Install Visual Studio Code Insiders
    type: Microsoft.DSC.Transitional/PowerShellScript
    metadata:
      description: "Install Visual Studio Code Insiders with context menu, file associations, and PATH"
      module: "Microsoft.DSC.Transitional"
    properties:
      input:
        id: "Microsoft.VisualStudioCode.Insiders"
        source: winget
        override: '/VERYSILENT /MERGETASKS="!runcode,addcontextmenufiles,addcontextmenufolders,associatewithfiles,addtopath"'
      testScript: |
        param($inputData)
        & {
          try {
            & winget list --id $inputData.id --exact --source $inputData.source 2>&1 | Out-Null
            return ($LASTEXITCODE -eq 0)
          } catch { return $false }
        } 2>$null
      setScript: |
        param($inputData)
        & {
          try {
            & winget install --id $inputData.id --source $inputData.source --silent --accept-package-agreements --accept-source-agreements --override $inputData.override 2>&1 | Out-Null
          } catch { }
        } 2>$null
