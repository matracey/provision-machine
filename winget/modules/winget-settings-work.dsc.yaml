# yaml-language-server: $schema=https://aka.ms/dsc/schemas/v3/bundled/config/document.json
# Work-only WinGet user/admin settings resources.
$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: Microsoft.WinGet/UserSettingsFile-0
    type: Microsoft.WinGet/UserSettingsFile
    metadata:
      description: "Configure WinGet user settings"
      module: "Microsoft.WinGet"
    properties:
      settings: {}
  - name: Microsoft.WinGet/AdminSettings-0
    type: Microsoft.WinGet/AdminSettings
    metadata:
      description: "Configure WinGet admin settings (requires elevation)"
      winget:
        securityContext: "elevated"
      module: "Microsoft.WinGet"
    properties:
      settings:
        LocalManifestFiles: false
        ProxyCommandLineOptions: false
        BypassCertificatePinningForMicrosoftStore: false
        InstallerHashOverride: false
        LocalArchiveMalwareScanOverride: false
